name: Render Executive Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ────────────────────────────────────────────────
      # kableExtra → xml2 → libxml2-dev
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libxml2-dev

      # ── R setup ────────────────────────────────────────────────────────────
      # use-public-rspm: pre-built binary packages for Ubuntu (no source compile)
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      # ── R package cache ────────────────────────────────────────────────────
      # Cache keyed on the package list so re-installs only happen when
      # the list changes, not on every push.
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-4.4-pkgs-${{ hashFiles('.github/workflows/render-report.yml') }}
          restore-keys: r-4.4-pkgs-

      - name: Install R packages
        run: |
          Rscript -e "install.packages(
            c('dplyr', 'readr', 'tibble', 'knitr', 'kableExtra', 'scales'),
            repos = 'https://cloud.r-project.org'
          )"

      # ── Quarto setup ───────────────────────────────────────────────────────
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.40"

      # ── Render ─────────────────────────────────────────────────────────────
      # The executive report reads only pre-committed PNG figures from
      # Results/Figures/ and CSV scalars from Analysis/. No model fitting
      # occurs during rendering — all heavy computation was done locally
      # and its outputs are committed to the repository.
      - name: Render executive report
        run: quarto render executive_report.qmd --to pdf

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: executive-report-pdf
          path: executive_report.pdf
          retention-days: 90
